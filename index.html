<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> </title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<header>
            <h1>Yasaman</h1>

            <p id="date"></p>

            <button id="themeBtn">
                🌙
            </button>
            
        </header>

    <div class="container">


        <section class="goal">

            <h2>Today's Goal</h2>

            <input
                type="text"
                id="goalInput"
                placeholder="Write your goal..."
            >

            <button id="saveGoal">
                Save
            </button>
<p id="goalText"></p>

        </section>

        <section class="todo">

            <h2>To Do List</h2>

            <input
                type="text"
                id="taskInput"
                placeholder="Add a task..."
            >

            <button id="addTask">
                Add
            </button>

            <ul id="taskList">
            </ul>

        </section>

        <section class="quote">

            <h2>Quote</h2>

            <p id="quoteText"></p>

        </section>

        <section class="timer">

            <h2>Pomodoro</h2>

            <h1 id="timer">25:00</h1>

            <button id="startBtn">Start</button>

            <button id="pauseBtn">Pause</button>

            <button id="resetBtn">Reset</button>

        </section>

    </div>

<script src="js/app.js"></script>

</body>
</html>
